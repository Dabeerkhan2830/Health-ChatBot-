<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Azure AI Invoice OCR Console - Extract printed and handwritten text from images with high precision.">
    <title>Azure AI | OCR Dashboard</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-box">
                    <span class="logo-icon">▲</span>
                    <span class="logo-text">AI STUDIO</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" id="nav-ocr">
                    <span class="nav-icon">📄</span> OCR Console
                </button>
                <button class="nav-item" id="nav-settings">
                    <span class="nav-icon">⚙️</span> Settings
                </button>
            </nav>
            <div class="sidebar-status">
                <div class="status-indicator"></div>
                <span class="status-text">Azure Connected</span>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="breadcrumb">
                    <span class="path">Services</span> / <span class="current">Invoice OCR</span>
                </div>
                <div class="user-profile">
                    <div class="user-avatar">AD</div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <section class="dashboard-grid">
                <!-- Data Input Section -->
                <div class="card glass upload-card">
                    <div class="card-header">
                        <h2>Extract Text</h2>
                        <span class="badge">OCR v4.0</span>
                    </div>
                    <div class="card-body">
                        <div class="upload-zone" id="upload-zone">
                            <input type="file" id="file-input" accept="image/*" hidden>
                            <div class="upload-icon">📤</div>
                            <p class="upload-text">Drag & Drop Invoice Image</p>
                            <p class="upload-hint">Supports JPG, PNG, WEBP (Max 5MB)</p>
                            <button class="btn-primary" id="browse-btn">Browse File</button>
                        </div>
                        <div class="preview-container hidden" id="preview-container">
                            <div class="preview-card">
                                <img id="image-preview" src="" alt="OCR Target Preview">
                                <div class="preview-overlay">
                                    <button class="btn-secondary" id="remove-btn">✕</button>
                                </div>
                            </div>
                            <button class="btn-primary" id="process-btn">Process Invoice</button>
                        </div>
                    </div>
                </div>

                <!-- Live Results Section -->
                <div class="card glass results-card">
                    <div class="card-header">
                        <h2>Extraction Results</h2>
                        <div class="header-actions">
                            <button class="btn-icon" id="copy-btn" title="Copy Text">📋</button>
                            <button class="btn-icon" id="clear-btn" title="Clear Results">🗑️</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="results-viewer" id="results-viewer">
                            <div class="empty-state">
                                <div class="pulse-ring"></div>
                                <p>Awaiting input...</p>
                            </div>
                        </div>
                        <div class="processing-overlay hidden" id="processing-loader">
                            <div class="spinner"></div>
                            <p>Analyzing with Azure AI...</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal-overlay hidden" id="settings-modal">
        <div class="modal glass">
            <div class="modal-header">
                <h3>Azure Configuration</h3>
                <button class="btn-close" id="close-settings">✕</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label for="azure-endpoint">Azure Endpoint</label>
                    <input type="text" id="azure-endpoint" placeholder="https://your-resource.cognitiveservices.azure.com/">
                </div>
                <div class="input-group">
                    <label for="azure-key">Azure Multi-Service Key</label>
                    <input type="password" id="azure-key" placeholder="Enter API Key">
                    <p class="form-hint">Stored locally in your browser (LocalStorage)</p>
                </div>
                <button class="btn-primary full-width" id="save-settings">Save Credentials</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
