<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Intelligence | News Summarizer</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="news-intelligence">
    <div class="glass-bg"></div>
    
    <!-- HEADER -->
    <header class="main-header">
        <div class="brand">
            <div class="logo-orb"></div>
            <h1>INTELLIGENCE<span>CONSOLE</span></h1>
        </div>
        <div class="header-meta">
            <div class="meta-item">
                <span class="label">STATUS:</span>
                <span class="value online">OPERATIONAL</span>
            </div>
            <button id="configBtn" class="action-btn-circle"><i class="fas fa-sliders-h"></i></button>
        </div>
    </header>

    <main class="content-wrapper">
        <!-- TOP ANALYTICS BAR -->
        <div class="analytics-strip">
            <div class="stat-item">
                <span class="stat-label">DAILY PULSE</span>
                <span class="stat-value">Active</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">AI ENGINE</span>
                <span class="stat-value">GPT-4o</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">LATENCY</span>
                <span class="stat-value">Optimal</span>
            </div>
        </div>

        <section class="intelligence-grid">
            <!-- INPUT WING -->
            <div class="input-wing glass-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-satellite-dish"></i> SOURCE FEED</h2>
                    <div class="source-toggle">
                        <button class="toggle-btn active" data-mode="text">PLAIN TEXT</button>
                        <button class="toggle-btn" data-mode="url">WEB URL</button>
                    </div>
                </div>
                
                <div class="input-area">
                    <textarea id="newsContent" placeholder="Paste intelligence report or news copy here..."></textarea>
                    <input type="url" id="newsUrl" class="hidden" placeholder="https://world-news-source.com/report">
                    
                    <div class="input-footer">
                        <div class="select-wrapper">
                            <label>SUMMARY DEPTH</label>
                            <select id="summaryType">
                                <option value="Executive Summary">EXECUTIVE BRIEF</option>
                                <option value="Bullet points">KEY HIGHLIGHTS</option>
                                <option value="In-depth analysis">CRITICAL ANALYSIS</option>
                            </select>
                        </div>
                        <button id="runBtn" class="primary-glow-btn">GENERATE INSIGHTS</button>
                    </div>
                </div>
            </div>

            <!-- OUTPUT WING -->
            <div class="output-wing glass-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-dna"></i> EXTRACTION OUTPUT</h2>
                    <div id="loader" class="loader hidden"></div>
                </div>
                
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-brain"></i>
                    <p>Awaiting source input for neural synthesis...</p>
                </div>

                    <div id="resultsArea" class="hidden">
                        <div class="result-block">
                            <h3 class="news-title">INTELLIGENCE BRIEF</h3>
                            <div id="summaryOutput" class="summary-box"></div>
                        </div>

                        <div class="result-block tags-grid">
                            <div class="tag-section">
                                <h4>KEY ENTITIES</h4>
                                <div id="entitiesBox" class="tag-cloud"></div>
                            </div>
                            <div class="tag-section">
                                <h4>CHRONOLOGY</h4>
                                <div id="datesBox" class="tag-cloud"></div>
                            </div>
                        </div>
                    </div>
            </div>
        </section>
    </main>

    <!-- CONFIG MODAL -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-pane glass-panel">
            <div class="modal-header">
                <h3>CLOUD CONNECTIVITY</h3>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="field">
                    <label>ENDPOINT URL</label>
                    <input type="text" id="epInput" placeholder="https://<resource>.openai.azure.com/">
                </div>
                <div class="field">
                    <label>COGNITIVE SERVICE KEY</label>
                    <input type="password" id="kyInput" placeholder="••••••••••••••••">
                </div>
                <div id="modalMsg" class="modal-msg hidden"></div>
            </div>
            <div class="modal-footer">
                <button id="testBtn" class="secondary-btn">TEST LINK</button>
                <button id="saveBtn" class="primary-glow-btn">SAVE CONFIG</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>
